<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>혐오 매력</title>
  <link rel="icon" type="image/png" href="썸네일.png">
  <style>
    * { cursor: none; }
    body, h1, h2, h3, p { margin: 0; }
    body {
      background-color: #ffffff;
      overflow-x: hidden;
    }
    .landing {
      width: 100vw;
      min-height: 100vh;
      padding: 60px 0 0 60px;
      position: relative;
      box-sizing: border-box;
    }
    .bg-text-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-row {
      display: block;
      font-family: 상상토끼 순악필여사 OTF;
      font-weight: 300;
      font-size: 30px;
      color: #FF0000;
      white-space: nowrap;
      line-height: 1.3;
      opacity: 1;
      animation: wave 2.5s ease-in-out infinite;
    }
    @keyframes wave {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-30px); }
      100% { transform: translateY(0px); }
    }
    h1.title-main {
      font-family: 상상토끼 순악필여사 OTF;
      font-weight: 300;
      font-size: 200px;
      line-height: 0.95;
      color: #FF0000;
      letter-spacing: -2px;
      position: relative;
      z-index: 4;
      background-color: #000000;
      display: inline;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      padding: 0 10px;
    }
    p.title-sub {
      font-family: 지백 beta;
      font-weight: 850;
      font-size: 35px;
      color: #FF0000;
      line-height: 1;
      margin-top: 8px;
      position: relative;
      z-index: 4;
      background-color: #000000;
      display: inline;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      padding: 2px 8px;
    }
    #warning {
      width: 100vw;
      min-height: 100vh;
      background: linear-gradient(to bottom, #000000 0%, #1a0000 40%, #FF0000 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
      box-sizing: border-box;
    }
    .warning-content { text-align: center; }
    .warning-title {
      font-family: SM3견출명조;
      font-weight: 900;
      font-size: 50px;
      color: #FF0000;
      line-height: 2;
      margin: 0 0 60px 0;
    }
    .warning-text {
      font-family: 지백 beta;
      font-weight: 400;
      font-size: 18px;
      color: #ffffff;
      line-height: 2;
      letter-spacing: 0.05em;
    }
    #videoWrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      overflow: hidden;
    }
    #acneVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    #zoom-wrap {
      position: absolute;
      width: 500px; height: 500px;
      overflow: hidden;
      pointer-events: none;
      display: none;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    #acneVideoZoom {
      position: absolute;
      width: 700%;
      transform: translate(var(--zx), var(--zy));
    }
    /* 커서 */
    #custom-cursor {
      position: fixed;
      width: 20px; height: 20px;
      background: #FFE600;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 99999;
      transition: width 0.15s ease, height 0.15s ease;
    }
    /* 팝업 창 */
    .popup-window {
      position: fixed;
      pointer-events: none;
      z-index: 9000;
      border: 2px solid #cccccc;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.5);
      background: #f0f0f0;
      animation: popFade 1.2s ease-out forwards;
      overflow: hidden;
    }
    .popup-titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      justify-content: space-between;
    }
    .popup-titlebar span {
      color: white;
      font-size: 11px;
      font-family: Arial, sans-serif;
    }
    .popup-titlebar .close-btn {
      background: #cc0000;
      color: white;
      font-size: 10px;
      font-family: Arial;
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #880000;
    }
    .popup-window img {
      display: block;
      width: 100%;
      height: calc(100% - 22px);
      object-fit: cover;
    }
    @keyframes popFade {
      0%   { opacity: 0; transform: scale(0.7); }
      15%  { opacity: 1; transform: scale(1); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #gallery-section { width: 100vw; background: #000; padding: 0; margin: 0; }
#gallery-grid { display: grid; grid-template-columns: repeat(5, 1fr); width: 100vw; gap: 0; }
.gallery-cell {
  width: 100%; aspect-ratio: 1/1; overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.08);
  cursor: crosshair; position: relative;
}
.gallery-cell img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: blur(14px) brightness(0.5);
  transform: scale(1);
  transition: filter 0.15s ease, transform 0.15s ease;
}
.gallery-cell:hover img {
  filter: blur(0px) brightness(1.2) contrast(1.1);
  transform: scale(1.25);
  z-index: 10;
}
.gallery-cell.flash img {
  filter: blur(0px) brightness(1.2);
  transform: scale(1.08);
}
  </style>
</head>
<body>

  <div id="custom-cursor"></div>

  <div class="landing" id="landingSection">

    <div id="videoWrap">
      <video id="acneVideo" autoplay muted loop playsinline>
        <source src="여드름.mov" type="video/mp4">
      </video>
      <div id="zoom-wrap">
        <video id="acneVideoZoom" autoplay muted loop playsinline>
          <source src="여드름.mov" type="video/mp4">
        </video>
      </div>
    </div>

    <div class="bg-text-wrap" id="bgTextWrap"></div>
    <h1 class="title-main">혐오 매력,</h1>
    <br>
    <p class="title-sub">당신이 이러한 콘텐츠를 계속 보게 되는 이유….</p>
  </div>

  <section id="warning">
    <div class="warning-content">
      <h2 class="warning-title">경고<br>WARNING</h2>
      <p class="warning-text">
        징그럽고 혐오스러운 장면이 있으니 심약자는 주의 바랍니다.<br>
        There is a scene that makes you feel sick and disgusted,<br>
        so please be careful if you are weak in your heart.
      </p>
    </div>
  </section>

<section id="gallery-section">
  <div id="gallery-grid"></div>
</section>
<script src="gallery.js"></script>

<script>
  setInterval(function() {
    const cells = document.querySelectorAll('.gallery-cell');
    if (!cells.length) return;
    const count = Math.floor(Math.random() * 8) + 3;
    for (let i = 0; i < count; i++) {
      const cell = cells[Math.floor(Math.random() * cells.length)];
      cell.classList.add('flash');
      setTimeout(function() {
        cell.classList.remove('flash');
      }, Math.random() * 600 + 200);
    }
  }, 300);
</script>

  <script>
    // 팝업
    const s = document.createElement("script");
    s.src = "popup.js";
    document.body.appendChild(s);
  </script>
</body>
</html>
